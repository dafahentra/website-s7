# netlify.toml — place at ROOT of project

[build]
  command   = "npm run build"
  publish   = "dist"           # Vite; change to "build" for CRA
  functions = "netlify/functions"

# Serve the one-time setup tool
[[redirects]]
  from   = "/moka-setup"
  to     = "/moka-setup.html"
  status = 200

# Catch the Moka OAuth redirect
[[redirects]]
  from   = "/callback"
  to     = "/callback.html"
  status = 200

# SPA fallback — must be LAST
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200