<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moka Callback</title>
  <style>
    body {
      font-family: -apple-system, sans-serif;
      background: #0a1628;
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; text-align: center; padding: 24px;
    }
    .box { max-width: 360px; }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h2 { font-size: 22px; font-weight: 900; margin-bottom: 8px; }
    p { font-size: 14px; color: rgba(255,255,255,0.6); line-height: 1.6; }
    .code-display {
      background: rgba(255,255,255,0.1); border-radius: 12px;
      padding: 12px 16px; margin: 16px 0;
      font-family: monospace; font-size: 12px;
      word-break: break-all; text-align: left;
    }
  </style>
</head>
<body>
<div class="box">
  <div class="icon" id="icon">⏳</div>
  <h2 id="title">Memproses...</h2>
  <p id="desc">Mengambil authorization code dari Moka...</p>
  <div class="code-display" id="codeDisplay" style="display:none"></div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const code  = params.get("code");
  const error = params.get("error");

  if (error) {
    document.getElementById("icon").textContent  = "❌";
    document.getElementById("title").textContent = "Authorization Ditolak";
    document.getElementById("desc").textContent  = `Error: ${error}. Kembali ke halaman setup dan coba lagi.`;
  } else if (code) {
    document.getElementById("icon").textContent  = "✅";
    document.getElementById("title").textContent = "Code Diterima!";
    document.getElementById("desc").textContent  = "Kamu akan diarahkan ke halaman setup...";
    document.getElementById("codeDisplay").style.display = "block";
    document.getElementById("codeDisplay").textContent   = `code: ${code}`;

    // Redirect to setup page with code in URL
    setTimeout(() => {
      window.location.href = `/moka-setup?code=${encodeURIComponent(code)}`;
    }, 1500);
  } else {
    document.getElementById("icon").textContent  = "⚠️";
    document.getElementById("title").textContent = "Tidak Ada Code";
    document.getElementById("desc").textContent  = "Halaman ini hanya untuk callback dari Moka. Buka /moka-setup untuk memulai.";
  }
</script>
</body>
</html>
